<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>동목포 오멘토 - 홈 화면에 추가</title>
  <link rel="manifest" href="/manifest.webmanifest">
  <style>
    :root {
      --bg-paper: #F7F4EA;
      --text-ink: #20343A;
      --accent-green: #2F766D;
      --accent-coral: #E86F4A;
      --highlight-yellow: #fef08a;
      --panel-tint: #DCE8E5;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans KR", sans-serif;
      height: 100dvh;
      width: 100vw;
      background: linear-gradient(135deg, #0d2c22 0%, #1e5249 50%, #2f766d 100%);
      color: #ffffff;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 24px 20px 40px 20px;
      position: relative;
      user-select: none;
    }

    /* 회전하는 패턴 배경 */
    .pattern-bg {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 600px;
      height: 600px;
      margin-top: -300px;
      margin-left: -300px;
      pointer-events: none;
      z-index: 1;
      opacity: 0.08;
      animation: spin-pattern 35s linear infinite;
    }

    @keyframes spin-pattern {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .pattern-item {
      position: absolute;
      width: 48px;
      height: 48px;
      fill: none;
      stroke: #ffffff;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* 4개의 보험 아이콘 배치 */
    .icon-shield { top: 10%; left: 50%; transform: translateX(-50%); }
    .icon-doc { right: 10%; top: 50%; transform: translateY(-50%) rotate(15deg); }
    .icon-heart { bottom: 10%; left: 50%; transform: translateX(-50%) rotate(-10deg); }
    .icon-cross { left: 10%; top: 50%; transform: translateY(-50%) rotate(-15deg); }

    /* 뒤로가기 버튼 */
    .back-link {
      align-self: flex-start;
      margin-top: calc(env(safe-area-inset-top, 20px) + 20px);
      color: rgba(255, 255, 255, 0.8);
      text-decoration: none;
      font-size: 14px;
      font-weight: 800;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(255, 255, 255, 0.1);
      border: 1.5px solid rgba(255, 255, 255, 0.25);
      padding: 10px 16px;
      border-radius: 8px;
      z-index: 10;
      transition: all 0.2s ease;
      cursor: pointer;
    }

    .back-link:hover {
      background: rgba(255, 255, 255, 0.2);
      color: #ffffff;
    }

    /* 메인 콘텐츠 카드 */
    .content-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 20px;
      z-index: 2;
      flex: 1;
      width: 100%;
      max-width: 380px;
    }

    .app-icon-wrapper {
      width: 120px;
      height: 120px;
      background: #ffffff;
      border-radius: 28px;
      padding: 12px;
      border: 3px solid var(--text-ink);
      box-shadow: 4px 4px 0px var(--text-ink);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 8px;
    }

    .app-icon {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .app-title {
      font-size: 28px;
      font-weight: 900;
      color: #ffffff;
      letter-spacing: -1px;
      text-shadow: 0 2px 8px rgba(0,0,0,0.15);
      background: linear-gradient(to bottom, #ffffff 60%, var(--highlight-yellow) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .app-subtitle {
      font-size: 16px;
      font-weight: 750;
      line-height: 1.5;
      color: #e2e8f0;
      word-break: keep-all;
    }

    /* 하단 가이드 배너 (당근 톤앤매너 응용) */
    .guide-banner {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 2px solid rgba(255, 255, 255, 0.15);
      border-radius: 16px;
      width: 100%;
      max-width: 360px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      z-index: 2;
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.15);
    }

    .guide-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      font-size: 14.5px;
      font-weight: 750;
      color: #ffffff;
    }

    .guide-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: var(--text-ink);
      color: #ffffff;
      font-size: 12.5px;
      font-weight: 850;
      padding: 6px 12px;
      border-radius: 8px;
      border: 1.5px solid rgba(255, 255, 255, 0.2);
    }

    .icon-share-safari {
      width: 22px;
      height: 22px;
      fill: none;
      stroke: #000000;
      stroke-width: 2.5;
      background: #ffffff;
      border: 1.5px solid var(--text-ink);
      padding: 4px;
      border-radius: 6px;
    }

    .icon-chevron {
      width: 14px;
      height: 14px;
      stroke: rgba(255, 255, 255, 0.4);
      stroke-width: 3;
    }
  </style>
</head>
<body>

  <!-- 회전하는 배경 패턴 -->
  <div class="pattern-bg">
    <!-- 방패 (Shield) -->
    <svg class="pattern-item icon-shield" viewBox="0 0 24 24">
      <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
    </svg>
    <!-- 문서 (Document) -->
    <svg class="pattern-item icon-doc" viewBox="0 0 24 24">
      <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
      <polyline points="14 2 14 8 20 8"/>
      <line x1="16" y1="13" x2="8" y2="13"/>
      <line x1="16" y1="17" x2="8" y2="17"/>
      <polyline points="10 9 9 9 8 9"/>
    </svg>
    <!-- 하트 (Heart) -->
    <svg class="pattern-item icon-heart" viewBox="0 0 24 24">
      <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
    </svg>
    <!-- 구급 십자가 (First Aid Cross) -->
    <svg class="pattern-item icon-cross" viewBox="0 0 24 24">
      <line x1="12" y1="5" x2="12" y2="19"/>
      <line x1="5" y1="12" x2="19" y2="12"/>
    </svg>
  </div>

  <!-- 뒤로 가기 링크 -->
  <div class="back-link" onclick="if(window.history.length > 1) { history.back(); } else { window.location.href = '/'; }">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <line x1="19" y1="12" x2="5" y2="12"/>
      <polyline points="12 19 5 12 12 5"/>
    </svg>
    돌아가기
  </div>

  <!-- 메인 콘텐츠 카드 -->
  <div class="content-card">
    <div class="app-icon-wrapper">
      <img src="/promy.png" alt="동목포 오멘토" class="app-icon">
    </div>
    <h1 class="app-title">동목포 오멘토</h1>
    <p class="app-subtitle">
      홈 화면에 추가하고<br>매일 편리하게 오멘토의 코칭을 받아보세요.
    </p>
  </div>

  <!-- 하단 가이드 배너 -->
  <div class="guide-banner">
    <div class="guide-row">
      <!-- Safari 공유 아이콘 -->
      <svg class="icon-share-safari" viewBox="0 0 24 24">
        <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/>
        <polyline points="16 6 12 2 8 6"/>
        <line x1="12" y1="2" x2="12" y2="15"/>
      </svg>
      <span>버튼을 누른 뒤</span>
    </div>
    
    <!-- Chevron 화살표 -->
    <svg class="icon-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="6 9 12 15 18 9"/>
    </svg>

    <div class="guide-row">
      <span class="guide-badge">홈 화면에 추가</span>
      <span>누르면 끝!</span>
    </div>
  </div>

</body>
</html>
